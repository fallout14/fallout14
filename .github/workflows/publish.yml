name: Publish
concurrency:
  group: publish


on:
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3.6.0
      with:
        submodules: 'recursive'

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3.2.0
      with:
        dotnet-version: 10.0.x

    - name: Get Engine Tag
      run: |
        cd RobustToolbox
        git fetch --tags

    - name: Install dependencies
      run: dotnet restore

    - name: Build Packaging
      run: dotnet build Content.Packaging --configuration Release --no-restore /m

    - name: Package server
      run: dotnet run --project Content.Packaging server --platform win-x64 --platform linux-x64 --platform osx-x64 --platform linux-arm64 --config-file /Resources/ConfigPresets/Fallout14/fallout14.toml

    - name: Package client
      run: dotnet run --project Content.Packaging client --no-wipe-release

    - name: Trigger server deploy
      run: |
        curl -s -X POST "https://www.fallout14.com/webhook/deploy" \
          -H "Authorization: Bearer ${{ secrets.DEPLOY_SECRET }}" \
          -w "\nHTTP %{http_code}\n"


