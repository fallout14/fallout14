# Really you should write your own
- type: htnCompound
  id: SimpleHostileCompound
  followerFollow: SimpleFollowHostileCompound
  followerPassive: SimplePassiveHostileCompound
  followerNeutral: SimpleNeutralHostileCompound
  branches:
    - tasks:
        - !type:HTNCompoundTask
          task: MeleeCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: IdleCompound
          
- type: htnCompound
  id: SimpleDumbHostileCompound
  branches:
    - tasks:
        - !type:HTNCompoundTask
          task: MeleeCombatCompound # MeleeDumbCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: IdleCompound

- type: htnCompound
