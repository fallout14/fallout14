# #Misfits Add

- type: entity
  parent: N14FalloutArmorBase
  id: M14ClothingOuterVaultCombatArmor
  name: vault combat armor
  description: An extremely advanced piece of combat armor manufactured with vault-tec colors, the strongest you can find in the vault
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/OuterClothing/Armor/vaultcombatarmor.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/OuterClothing/Armor/vaultcombatarmor.rsi
  - type: IntegratedNightVisionArmor # #Misfits Add: Completes the vault NV set when worn with the vault combat helmet.
    setId: vault-combat
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.6
        Slash: 0.6
        Piercing: 0.55
        Heat: 0.55
    priceMultiplier: 0.5
  - type: ExplosionResistance
    damageCoefficient: 0.75
  - type: ClothingSpeedModifier # Forge-Add
    walkModifier: 0.95
    sprintModifier: 0.95

- type: entity
  parent: N14FalloutArmorBase
  id: M14ClothingOuterVaultAdvancedVest
  name: advanced vault security vest
  description: An advanced ballistic vest manufactured for vault security, it restricts movement but provides great protection.
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/OuterClothing/Armor/advancedvaultvest.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/OuterClothing/Armor/advancedvaultvest.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.70
        Slash: 0.70
        Piercing: 0.675
        Heat: 0.75
    priceMultiplier: 0.5
  - type: ClothingSpeedModifier
    walkModifier: 0.975

- type: entity
  parent: [ClothingOuterStorageBase, ClothingOuterHardsuitBase]
  id: N14ClothingOuterVolMatSuit
  name: VMHE suit
  description: A versatile and advanced development of the Vault-Tec Radsuit, the Volatile Materials and Hazardous Environments suit is designed to keep its user alive through a variety of circumstances. Built with lightweight impact jel underneath a layer of treated polybenzimidazole, its efficacy is proven against acid rains, radiation, and chemical explosions. "DO NOT PUNCTURE".
  components:
  - type: Sprite
    sprite: _Nuclear14/Clothing/OuterClothing/Coats/falloutvolmatsuit.rsi
  - type: Clothing
    sprite: _Nuclear14/Clothing/OuterClothing/Coats/falloutvolmatsuit.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.90
        Slash: 0.90
        Piercing: 0.90
        Heat: 0.70
        Radiation: 0.15
        Caustic: 0.15
  - type: ClothingSpeedModifier
    walkModifier: 0.95
    sprintModifier: 0.95
  - type: ExplosionResistance
    damageCoefficient: 0.15
  - type: ToggleableClothing
    clothingPrototype: N14ClothingHeadHatHelmetVolMatHelmet
    slot: head
