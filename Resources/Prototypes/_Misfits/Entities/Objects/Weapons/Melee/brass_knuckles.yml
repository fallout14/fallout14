- type: entity
  parent: ClothingHandsBase
  id: N14MeleeHandsBrassKnuckle
  name: brass knuckle
  description: A Hardened knuckle grip that is actually made out of steel. They protect your hand, and do more damage, in unarmed combat.
  components:
  - type: Sprite
    sprite: _Misfits/Objects/Weapons/Melee/brassknuckles.rsi
    state: icon
  - type: Clothing
    sprite: _Misfits/Objects/Weapons/Melee/brassknuckles.rsi
    slots: [gloves]
  - type: MeleeWeapon
    soundHit:
      collection: MetalThud
    range: 1.3
    attackRate: 0.9
    damage:
      types:
        Blunt: 20
        Structural: 5
    animation: WeaponArcFist
    wideAnimation: WeaponArcFist
    mustBeEquippedToUse: true
  - type: StaminaDamageOnHit
    damage: 10

