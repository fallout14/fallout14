# #Misfits Add - Enclave rank pin loadouts for the expanded role hierarchy.

# === Enlisted Ranks (EnclaveEnlisted) ===

- type: loadout
  id: LoadoutEnclavePinPrivate
  category: Roles
  cost: 1
  exclusive: true
  requirements:
    - !type:CharacterJobRequirement
      jobs:
        - EnclaveEnlisted
  items:
    - ClothingNeckPinEnclavePrivate

- type: loadout
  id: LoadoutEnclavePinPFC
  category: Roles
  cost: 1
  exclusive: true
  requirements:
    - !type:CharacterJobRequirement
      jobs:
        - EnclaveEnlisted
    - !type:CharacterPlaytimeRequirement
      tracker: EnclaveEnlisted
      min: 72000 # 20 hours
  items:
    - ClothingNeckPinEnclavePFC

- type: loadout
  id: LoadoutEnclavePinSpecialist
  category: Roles
  cost: 1
  exclusive: true
  requirements:
    - !type:CharacterJobRequirement
      jobs:
        - EnclaveEnlisted
    - !type:CharacterPlaytimeRequirement
      tracker: EnclaveEnlisted
      min: 144000 # 40 hours
  items:
    - ClothingNeckPinEnclaveSpecialist

