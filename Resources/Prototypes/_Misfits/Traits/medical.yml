# #Misfits Change - Ported from Delta-V: chronic pain trait

- type: trait
  id: FiremanCarry
  category: Physical
  hidden: true
  functions:
    - !type:TraitAddComponent
      components:
        - type: CanFiremanCarry

- type: trait
  id: ChronicPain
  category: Physical
  points: 2
  requirements:
    - !type:CharacterSpeciesRequirement
      inverted: true
      species:
        - IPC
  functions:
    - !type:TraitAddComponent
      components:
        - type: ChronicPain

- type: trait
  id: MisfitsFeralRage
  category: Physical
  points: 4
  requirements:
    - !type:CharacterSpeciesRequirement
      species:
        - Ghoul
        - GhoulGlowing
  functions:
    - !type:TraitAddComponent
      components:
        - type: FeralGhoulifyOverTime
