# Scrapped the entire system with the gun dropping because half of the time it didn't work anyways.
# They will not pick up guns either, only use what is given to them

- type: htnCompound
  id: N14RangedCombatCompound
  branches:
    - preconditions:
        - !type:GunAmmoPrecondition
          minPercent: 0.001
      tasks:
        - !type:HTNCompoundTask
          task: N14GunCombatCompound

- type: htnCompound
  id: N14OrderedRangedCombatCompound
  branches:
    - preconditions:
        - !type:GunAmmoPrecondition
          minPercent: 0.001
      tasks:
        - !type:HTNCompoundTask
          task: N14OrderedGunCombatCompound

- type: htnCompound
  id: N14GunCombatCompound
  branches:
    - tasks:
        - !type:HTNPrimitiveTask
          operator: !type:JukeOperator
            jukeType: Away
            retreatDistance: 2.5

        - !type:HTNPrimitiveTask
          operator: !type:UtilityOperator
            proto: NearbyGunTargets

        - !type:HTNPrimitiveTask
          operator: !type:MoveToOperator
            shutdownState: PlanFinished
            pathfindInPlanning: false
            removeKeyOnFinish: false
            targetKey: TargetCoordinates
            pathfindKey: TargetPathfind
            stopOnLineOfSight: true
            rangeKey: MeleeRange

        - !type:HTNPrimitiveTask
          preconditions:
            - !type:KeyExistsPrecondition
              key: Target
          operator: !type:GunOperator
            targetKey: Target
          services:
            - !type:UtilityService
              id: RangedService
              proto: NearbyGunTargets
              key: Target

- type: htnCompound
  id: N14OrderedGunCombatCompound
  branches:
    - tasks:
        - !type:HTNPrimitiveTask
          operator: !type:JukeOperator
            jukeType: Away
            retreatDistance: 2.5

        - !type:HTNPrimitiveTask
          operator: !type:UtilityOperator
            proto: OrderedTargets

        - !type:HTNPrimitiveTask
          operator: !type:MoveToOperator
            shutdownState: PlanFinished
            pathfindInPlanning: false
            removeKeyOnFinish: false
            targetKey: TargetCoordinates
            pathfindKey: TargetPathfind
            stopOnLineOfSight: true
            rangeKey: MeleeRange

        - !type:HTNPrimitiveTask
          preconditions:
            - !type:KeyExistsPrecondition
              key: Target
          operator: !type:GunOperator
            targetKey: Target
          services:
            - !type:UtilityService
              id: RangedService
              proto: OrderedTargets
              key: Target
