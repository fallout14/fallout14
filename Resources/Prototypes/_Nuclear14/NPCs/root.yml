- type: htnCompound
  id: N14TurretCompound
  branches:
    - tasks:
        - !type:HTNPrimitiveTask
          operator: !type:UtilityOperator
            proto: NearbyGunTargets
        - !type:HTNPrimitiveTask
          preconditions:
            - !type:KeyExistsPrecondition
              key: Target
            - !type:TargetInRangePrecondition
              targetKey: Target
              rangeKey: RangedRange
            - !type:TargetInLOSPrecondition
              targetKey: Target
              rangeKey: RangedRange
          operator: !type:GunOperator
            targetKey: Target
            requireLOS: true
          services:
            - !type:UtilityService
              id: RangedService
              proto: NearbyGunTargets
              key: Target
# No unnecessary turret spin all the time.

- type: htnCompound
  id: N14RangedHostileCompound
  followerFollow: N14RangedFollowHostileCompound
  followerPassive: N14PassiveRangedHostileCompound
  followerNeutral: N14NeutralRangedHostileCompound
  branches:
    - tasks:
        - !type:HTNCompoundTask
          task: N14RangedCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: N14MeleeCombatCompound
# Whole point of making this was to ensure mobs don't roam around freely across the map when they have no targets. Don't change that.

- type: htnCompound
  id: N14RangedFollowHostileCompound
  branches:
    - tasks:
        - !type:HTNCompoundTask
          task: N14RangedCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: N14MeleeCombatCompound
    - tasks:
        - !type:HTNPrimitiveTask
          preconditions:
            - !type:CoordinatesNotInRangePrecondition
              targetKey: FollowTarget
              rangeKey: FollowRange
          operator: !type:MoveToOperator
            pathfindInPlanning: false
            targetKey: FollowTarget
            rangeKey: FollowCloseRange
            removeKeyOnFinish: false
    - tasks:
        - !type:HTNCompoundTask
          task: FollowerWanderCompound
    - tasks:
        - !type:HTNCompoundTask
          task: HoldPositionCompound

- type: htnCompound
  id: N14PassiveRangedHostileCompound
  branches:
    - tasks:
        - !type:HTNPrimitiveTask
          preconditions:
            - !type:CoordinatesNotInRangePrecondition
              targetKey: FollowTarget
              rangeKey: FollowRange
          operator: !type:MoveToOperator
            pathfindInPlanning: false
            targetKey: FollowTarget
            rangeKey: FollowCloseRange
            removeKeyOnFinish: false
    - tasks:
        - !type:HTNCompoundTask
          task: FollowerWanderCompound
    - tasks:
        - !type:HTNCompoundTask
          task: HoldPositionCompound

- type: htnCompound
  id: N14NeutralRangedHostileCompound
  branches:
    - tasks:
        - !type:HTNCompoundTask
          task: N14OrderedRangedCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: N14OrderedMeleeCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: OrderedFollowCompound
    - tasks:
        - !type:HTNCompoundTask
          task: IdleCompound
